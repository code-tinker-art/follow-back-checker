name: Check Follow-Back Status

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check-followers:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run follow-back checker
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python follow_back_checker.py > follow_check_result.txt 2>&1 || true
          cat follow_check_result.txt
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: follow-check-results
          path: follow_check_result.txt
          retention-days: 30

  cleanup-old-runs:
    needs: check-followers
    runs-on: ubuntu-latest
    if: always()
    
    permissions:
      actions: write
    
    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: context.workflow_id,
              per_page: 100,
              status: 'completed'
            });
            
            // Keep only the latest 5 runs
            const runsToDelete = runs.data.workflow_runs.slice(5);
            
            for (const run of runsToDelete) {
              console.log(`Deleting run #${run.id}`);
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });
            }
